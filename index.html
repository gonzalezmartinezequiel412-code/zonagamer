<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Zona Gamer</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:white;
}

header {
    text-align:center;
    padding:15px;
    background:#020617;
    color:#38bdf8;
    font-size:22px;
}

nav {
    display:flex;
    justify-content:space-around;
    background:#020617;
    padding:10px;
}

nav button {
    background:none;
    border:none;
    color:white;
    font-size:16px;
    cursor:pointer;
}

section {
    display:none;
    padding:20px;
}

.active {
    display:block;
}

.card {
    background:#020617;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

input {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border:none;
}

button {
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>

</head>
<body>

<header>Zona Gamer 🎮</header>

<nav>
<button onclick="ir('inicio')">Inicio</button>
<button onclick="ir('minecraft')">Minecraft</button>
<button onclick="ir('gta')">GTA V</button>
</nav>

<section id="inicio" class="active">
<h2>Bienvenido</h2>
<p>Elegí un juego para ver su guía 👇</p>
</section>

<section id="minecraft">
<div class="card">
<h2>Minecraft</h2>
<p>Guía básica: sobreviví la primera noche consiguiendo madera y carbón.</p>

<button onclick="like(this)">❤️ 0</button>

<input id="input-minecraft" placeholder="Escribí un comentario">
<button onclick="comentar('minecraft')">Comentar</button>

<ul id="lista-minecraft"></ul>
</div>
</section>

<section id="gta">
<div class="card">
<h2>GTA V</h2>
<p>Tip: completá misiones secundarias para ganar dinero rápido.</p>

<button onclick="like(this)">❤️ 0</button>

<input id="input-gta" placeholder="Escribí un comentario">
<button onclick="comentar('gta')">Comentar</button>

<ul id="lista-gta"></ul>
</div>
</section>

<script>
function ir(id){
    let secciones = document.querySelectorAll("section");
    secciones.forEach(sec => sec.classList.remove("active"));

    document.getElementById(id).classList.add("active");
}

// LIKE
function like(btn){
    if(btn.dataset.like == "1"){
        btn.dataset.like = "0";
        btn.innerText = "❤️ 0";
    } else {
        btn.dataset.like = "1";
        btn.innerText = "❤️ 1";
    }
}

// COMENTAR
function comentar(id){
    let input = document.getElementById("input-"+id);
    let lista = document.getElementById("lista-"+id);

    if(input.value.trim() !== ""){
        let li = document.createElement("li");
        li.textContent = input.value;
        lista.appendChild(li);
        input.value = "";
    }
}
</script>

</body>
</html>
