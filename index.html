<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Zona Gamer</title>

<style>
body {margin:0;font-family:sans-serif;background:#0f172a;color:white;}
header {text-align:center;padding:15px;color:#38bdf8;}
nav {display:flex;justify-content:center;gap:20px;background:#020617;padding:10px;}
section {display:none;padding:20px;}
.active {display:block;}
button {margin-top:10px;padding:10px;border:none;border-radius:10px;cursor:pointer;}
input {width:100%;padding:10px;margin-top:10px;}
</style>

<script>
function mostrar(id){
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// LIKE simple (toggle)
function like(btn){
    if(btn.classList.contains("activeLike")){
        btn.classList.remove("activeLike");
        btn.innerText = "❤️ 0";
    } else {
        btn.classList.add("activeLike");
        btn.innerText = "❤️ 1";
    }
}

// COMENTAR
function comentar(id){
    let input = document.getElementById("input-"+id);
    let lista = document.getElementById("comentarios-"+id);

    if(input.value !== ""){
        let comentarios = JSON.parse(localStorage.getItem("coment-"+id)) || [];
        comentarios.push(input.value);
        localStorage.setItem("coment-"+id, JSON.stringify(comentarios));

        cargarComentarios(id);
        input.value = "";
    }
}

function cargarComentarios(id){
    let lista = document.getElementById("comentarios-"+id);
    let comentarios = JSON.parse(localStorage.getItem("coment-"+id)) || [];

    lista.innerHTML = "";

    comentarios.forEach((texto, index)=>{
        let li = document.createElement("li");

        let span = document.createElement("span");
        span.textContent = texto;

        let btn = document.createElement("button");
        btn.textContent = "X";
        btn.onclick = function(){
            borrarComentario(id, index);
        };

        li.appendChild(span);
        li.appendChild(btn);
        lista.appendChild(li);
    });
}

function borrarComentario(id, index){
    let comentarios = JSON.parse(localStorage.getItem("coment-"+id)) || [];
    comentarios.splice(index,1);
    localStorage.setItem("coment-"+id, JSON.stringify(comentarios));

    cargarComentarios(id);
}
}window.onload = function(){
    ["minecraft","gta","fortnite","cod"].forEach(id=>{
        cargarComentarios(id);
    });
}
</script>

</head>
<body>

<header>Zona Gamer 🎮</header>

<nav>
<a onclick="mostrar('inicio')">Inicio</a>
<a onclick="mostrar('minecraft')">Minecraft</a>
<a onclick="mostrar('gta')">GTA V</a>
<a onclick="mostrar('fortnite')">Fortnite</a>
<a onclick="mostrar('cod')">Call of Duty</a>
</nav>

<section id="inicio" class="active">
<h2>Elegí un juego</h2>
<button onclick="mostrar('minecraft')">Minecraft</button>
<button onclick="mostrar('gta')">GTA V</button>
<button onclick="mostrar('fortnite')">Fortnite</button>
<button onclick="mostrar('cod')">Call of Duty</button>
</section>

<section id="minecraft">
<h2>Minecraft</h2>
<img src="https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png" width="100%">
<button onclick="like(this)">❤️ 0</button>

<input id="input-minecraft">
<button onclick="comentar('minecraft')">Comentar</button>
<ul id="comentarios-minecraft"></ul>

<button onclick="mostrar('inicio')">Volver</button>
</section>

<section id="gta">
<h2>GTA V</h2>
<img src="https://upload.wikimedia.org/wikipedia/en/a/a5/Grand_Theft_Auto_V.png" width="100%">
<button onclick="like(this)">❤️ 0</button>

<input id="input-gta">
<button onclick="comentar('gta')">Comentar</button>
<ul id="comentarios-gta"></ul>

<button onclick="mostrar('inicio')">Volver</button>
</section>

<section id="fortnite">
<h2>Fortnite</h2>
<img src="https://upload.wikimedia.org/wikipedia/en/0/09/Fortnite_cover.jpg" width="100%">
<button onclick="like(this)">❤️ 0</button>

<input id="input-fortnite">
<button onclick="comentar('fortnite')">Comentar</button>
<ul id="comentarios-fortnite"></ul>

<button onclick="mostrar('inicio')">Volver</button>
</section>

<section id="cod">
<h2>Call of Duty</h2>
<img src="https://upload.wikimedia.org/wikipedia/en/6/65/Call_of_Duty_Modern_Warfare_II_Key_Art.jpg" width="100%">
<button onclick="like(this)">❤️ 0</button>

<input id="input-cod">
<button onclick="comentar('cod')">Comentar</button>
<ul id="comentarios-cod"></ul>

<button onclick="mostrar('inicio')">Volver</button>
</section>

</body>
</html>
